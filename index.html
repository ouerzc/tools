<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="assets/css/app.css" />
  <title>DevKit Hub | 在线开发工具集合</title>
</head>
<body>
  <a class="skip-link" href="#main-content">跳到主要内容</a>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="DevKit Hub 首页">
        <span class="mark">{ }</span>
        <span>DevKit Hub</span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a class="active" href="#tools">工具</a>
        <a href="#shortcuts">快捷入口</a>
        <a href="#tags">标签</a>
      </nav>
      <div class="status-chip"><span class="dot"></span><span>LOCAL</span></div>
    </header>

    <main id="main-content" class="home-layout">
      <section class="stack" aria-labelledby="page-title">
        <section class="command-panel">
          <div class="headline">
            <h1 id="page-title">开发工具</h1>
            <span class="count" id="toolCount">3 tools</span>
          </div>
          <div class="command-row">
            <label class="searchbox">
              <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21 21-4.2-4.2m1.2-5A7.2 7.2 0 1 1 3.6 11.8a7.2 7.2 0 0 1 14.4 0Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <input id="toolSearch" type="search" placeholder="搜索 JSON、diff、timestamp..." autocomplete="off" />
              <span class="kbd">⌘K</span>
            </label>
            <button class="btn dark" type="button" id="copyHub">复制入口</button>
          </div>
          <div class="tag-row" aria-label="常用标签">
            <span class="pill">JSON</span>
            <span class="tag">Diff</span>
            <span class="tag">Formatter</span>
            <span class="tag">Timestamp</span>
          </div>
        </section>

        <section class="tools-grid" id="tools" aria-label="工具入口" aria-live="polite"></section>
        <div class="empty-state" id="emptyState">没有匹配工具。</div>
      </section>

      <aside class="sidebar" id="shortcuts" aria-label="快捷入口">
        <section class="side-panel">
          <div class="side-head">
            <h2>快捷入口</h2>
            <span class="mono">D/F/T</span>
          </div>
          <div class="shortcuts" id="shortcutList"></div>
        </section>

        <section class="side-panel" id="tags">
          <div class="side-head">
            <h2>标签</h2>
            <span class="mono" id="tagCount">0</span>
          </div>
          <div class="tag-list" id="tagList"></div>
        </section>
      </aside>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">已复制</div>
  <script src="assets/js/tools.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/home.js"></script>
</body>
</html>
