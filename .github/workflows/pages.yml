name: Deploy app to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Publish dist to gh-pages
        run: |
          touch dist/.nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/tools-gh-pages
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/tools-gh-pages origin/gh-pages
          else
            git worktree add --detach /tmp/tools-gh-pages
            git -C /tmp/tools-gh-pages checkout --orphan gh-pages
          fi
          find /tmp/tools-gh-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. /tmp/tools-gh-pages/
          git -C /tmp/tools-gh-pages add -A
          if git -C /tmp/tools-gh-pages diff --cached --quiet; then
            echo "No Pages changes to publish."
          else
            git -C /tmp/tools-gh-pages commit -m "deploy: publish GitHub Pages"
            git -C /tmp/tools-gh-pages push origin HEAD:gh-pages
          fi
