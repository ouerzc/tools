<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="../assets/css/app.css" />
  <title>时间戳转换 | DevKit Hub</title>
</head>
<body>
  <a class="skip-link" href="#main-content">跳到主要内容</a>
  <div class="tool-shell" id="main-content">
    <header class="tool-topbar">
      <a class="brand" href="../index.html"><span class="mark">{ }</span><span>DevKit Hub</span></a>
      <a class="back-link" href="../index.html">返回工具集合</a>
    </header>

    <h1 class="page-title">时间戳转换</h1>
    <p class="lead">秒、毫秒、日期和时区互转。常用值可直接复制。</p>

    <section class="tool-grid time-grid" aria-label="时间戳转换工具">
      <div class="panel">
        <div class="panel-head"><strong>输入</strong><span class="status-text" id="status">等待输入</span></div>
        <div class="form">
          <label class="field">Unix 时间戳
            <input id="stamp" inputmode="numeric" placeholder="1718006400 或 1718006400000" autocomplete="off" />
          </label>

          <div class="inline-fields">
            <label class="field">日期时间
              <input id="dateInput" type="datetime-local" step="1" />
            </label>
            <label class="field">输入时区
              <select id="inputZone"></select>
            </label>
          </div>

          <label class="field">显示时区
            <select id="displayZone"></select>
          </label>

          <div class="actions">
            <button class="btn primary" id="convert" type="button">转换</button>
            <button class="btn" id="clear" type="button">清空</button>
          </div>

          <div class="quick">
            <p class="quick-title">快捷入口</p>
            <div class="quick-actions">
              <button class="btn" id="quickNow" type="button">当前时间</button>
              <button class="btn" id="quickToday" type="button">今天 00:00</button>
              <button class="btn" id="quickTomorrow" type="button">明天 00:00</button>
              <button class="btn" id="quickWeek" type="button">一周后</button>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><strong>转换结果</strong><span class="status-text" id="zoneStatus">Asia/Shanghai</span></div>
        <div class="result-list" id="result">
          <div class="result-row"><span>Unix 秒</span><strong class="value" data-key="seconds">未转换</strong><button class="copy-small" data-copy="seconds" type="button">复制</button></div>
          <div class="result-row"><span>Unix 毫秒</span><strong class="value" data-key="milliseconds">未转换</strong><button class="copy-small" data-copy="milliseconds" type="button">复制</button></div>
          <div class="result-row"><span>显示时区</span><strong class="value" data-key="zoned">未转换</strong><button class="copy-small" data-copy="zoned" type="button">复制</button></div>
          <div class="result-row"><span>UTC</span><strong class="value" data-key="utc">未转换</strong><button class="copy-small" data-copy="utc" type="button">复制</button></div>
          <div class="result-row"><span>ISO 8601</span><strong class="value" data-key="iso">未转换</strong><button class="copy-small" data-copy="iso" type="button">复制</button></div>
          <div class="result-row"><span>相对时间</span><strong class="value" data-key="relative">未转换</strong><button class="copy-small" data-copy="relative" type="button">复制</button></div>
          <div class="result-row"><span>星期</span><strong class="value" data-key="weekday">未转换</strong><button class="copy-small" data-copy="weekday" type="button">复制</button></div>
          <div class="result-row"><span>周数</span><strong class="value" data-key="week">未转换</strong><button class="copy-small" data-copy="week" type="button">复制</button></div>
          <div class="result-row"><span>年内第几天</span><strong class="value" data-key="dayOfYear">未转换</strong><button class="copy-small" data-copy="dayOfYear" type="button">复制</button></div>
        </div>
      </div>
    </section>

    <section class="side-grid" aria-label="额外时间功能">
      <div class="mini-panel">
        <h2>时区对照</h2>
        <div class="timezone-list" id="timezoneCompare">
          <div class="tz-row" data-city="Asia/Shanghai"><span class="tz-city">上海</span><strong class="tz-time">未转换</strong></div>
          <div class="tz-row" data-city="UTC"><span class="tz-city">UTC</span><strong class="tz-time">未转换</strong></div>
          <div class="tz-row" data-city="America/Los_Angeles"><span class="tz-city">洛杉矶</span><strong class="tz-time">未转换</strong></div>
          <div class="tz-row" data-city="Europe/London"><span class="tz-city">伦敦</span><strong class="tz-time">未转换</strong></div>
          <div class="tz-row" data-city="Asia/Tokyo"><span class="tz-city">东京</span><strong class="tz-time">未转换</strong></div>
        </div>
      </div>

      <div class="mini-panel">
        <h2>开发常用</h2>
        <div class="notes">
          <div>当前秒级时间戳：<strong id="liveSeconds">计算中</strong></div>
          <div>当前毫秒时间戳：<strong id="liveMilliseconds">计算中</strong></div>
          <div>当前本地时区：<strong id="localZone">计算中</strong></div>
          <div>显示 UTC 偏移：<strong id="zoneOffset">计算中</strong></div>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">已复制</div>
  <script src="../assets/js/shared.js"></script>
  <script src="../assets/js/timestamp.js"></script>
</body>
</html>
