<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JSON Diff | DevKit Hub</title>
  <style>
    :root {
      --bg: oklch(98% 0.005 250);
      --surface: oklch(100% 0 0);
      --surface-2: oklch(96% 0.007 250);
      --fg: oklch(22% 0.02 240);
      --muted: oklch(50% 0.018 240);
      --border: oklch(90% 0.008 240);
      --accent: oklch(58% 0.16 145);
      --accent-2: oklch(62% 0.15 205);
      --danger: oklch(61% 0.17 25);
      --code-bg: oklch(18% 0.025 250);
      --code-fg: oklch(92% 0.012 170);
      --font-display: "Aptos Display", "SF Pro Display", "Segoe UI Variable Display", system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg); font: 16px/1.55 var(--font-body); -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }
    button, textarea { font: inherit; }
    a, button, textarea { touch-action: manipulation; }
    :focus-visible { outline: 2px solid color-mix(in oklch, var(--accent) 68%, white); outline-offset: 3px; }
    .skip-link { position: fixed; top: 12px; left: 12px; z-index: 100; translate: 0 -72px; border-radius: 8px; background: var(--code-bg); color: var(--code-fg); padding: 10px 12px; font: 13px/1 var(--font-mono); transition: translate 0.16s ease; }
    .skip-link:focus { translate: 0 0; }
    .shell { width: min(1360px, calc(100vw - 32px)); margin: 0 auto; padding: 18px 0 40px; }
    .top { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 22px; }
    .brand { display: inline-flex; gap: 10px; align-items: center; font-weight: 760; font-family: var(--font-display); }
    .mark { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 8px; background: var(--accent); color: white; font: 700 15px/1 var(--font-mono); }
    .back { border: 1px solid var(--border); border-radius: 999px; padding: 8px 12px; color: var(--muted); background: var(--surface); }
    .title { display: grid; grid-template-columns: 1fr auto; gap: 18px; align-items: end; margin-bottom: 18px; }
    h1 { margin: 0; font: 760 clamp(36px, 6vw, 72px)/0.98 var(--font-display); letter-spacing: 0; }
    .lead { margin: 12px 0 0; max-width: 720px; color: var(--muted); font-size: 18px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { min-height: 42px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); padding: 0 14px; font-weight: 690; cursor: pointer; }
    .btn.primary { background: var(--accent); border-color: transparent; color: white; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .panel { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); overflow: hidden; }
    .panel-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--surface-2); }
    .panel-head strong { font-size: 15px; }
    textarea { width: 100%; min-height: 360px; resize: vertical; border: 0; outline: none; padding: 16px; color: var(--code-fg); background: var(--code-bg); font: 14px/1.6 var(--font-mono); tab-size: 2; }
    .result { margin-top: 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); overflow: hidden; }
    .result-body { padding: 14px 16px; display: grid; gap: 8px; background: var(--code-bg); color: var(--code-fg); min-height: 220px; font: 14px/1.6 var(--font-mono); white-space: pre-wrap; overflow: auto; }
    .line { display: grid; grid-template-columns: 70px 1fr; gap: 12px; }
    .badge { font-size: 12px; color: var(--muted); }
    .added { color: oklch(82% 0.12 145); }
    .removed { color: oklch(78% 0.14 25); }
    .changed { color: oklch(82% 0.13 72); }
    .status { color: var(--muted); font: 13px/1.4 var(--font-mono); }
    .error { color: var(--danger); }
    @media (max-width: 840px) { .title, .grid { grid-template-columns: 1fr; } textarea { min-height: 260px; } .shell { width: min(100% - 20px, 720px); } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; transition-duration: 0.01ms !important; } }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">跳到主要内容</a>
  <div class="shell" id="main-content">
    <header class="top">
      <a class="brand" href="../index.html"><span class="mark">{ }</span><span>DevKit Hub</span></a>
      <a class="back" href="../index.html">返回工具集合</a>
    </header>
    <section class="title">
      <div>
        <h1>JSON Diff</h1>
        <p class="lead">比较两个 JSON 对象，按字段路径输出新增、删除和变更。输入错误会先暴露，不会给出伪结果。</p>
      </div>
      <div class="actions">
        <button class="btn" type="button" id="sample">填入示例</button>
        <button class="btn primary" type="button" id="compare">比较</button>
      </div>
    </section>
    <section class="grid" aria-label="JSON 输入">
      <label class="panel">
        <span class="panel-head"><strong>左侧 JSON</strong><span class="status" id="leftStatus">等待输入</span></span>
        <textarea id="leftJson" spellcheck="false" placeholder='{"name":"devkit","version":1}'></textarea>
      </label>
      <label class="panel">
        <span class="panel-head"><strong>右侧 JSON</strong><span class="status" id="rightStatus">等待输入</span></span>
        <textarea id="rightJson" spellcheck="false" placeholder='{"name":"devkit","version":2}'></textarea>
      </label>
    </section>
    <section class="result" aria-live="polite">
      <div class="panel-head">
        <strong>差异结果</strong>
        <button class="btn" type="button" id="copy">复制结果</button>
      </div>
      <div class="result-body" id="result">粘贴两段 JSON 后点击比较。</div>
    </section>
  </div>
  <script>
    const leftInput = document.getElementById("leftJson");
    const rightInput = document.getElementById("rightJson");
    const result = document.getElementById("result");
    const leftStatus = document.getElementById("leftStatus");
    const rightStatus = document.getElementById("rightStatus");

    function parseJson(input, status) {
      if (!input.value.trim()) {
        status.textContent = "等待输入";
        status.classList.remove("error");
        return { ok: false, empty: true };
      }
      try {
        const value = JSON.parse(input.value);
        status.textContent = "JSON 有效";
        status.classList.remove("error");
        return { ok: true, value };
      } catch (error) {
        status.textContent = error.message;
        status.classList.add("error");
        return { ok: false, error };
      }
    }

    function flatten(value, prefix = "") {
      if (value && typeof value === "object" && !Array.isArray(value)) {
        return Object.entries(value).reduce((acc, [key, child]) => ({ ...acc, ...flatten(child, prefix ? `${prefix}.${key}` : key) }), {});
      }
      return { [prefix || "$"]: JSON.stringify(value) };
    }

    function addDiffLine(kind, path, value) {
      const row = document.createElement("span");
      row.className = `line ${kind.toLowerCase()}`;
      const label = document.createElement("span");
      label.textContent = kind;
      const body = document.createElement("span");
      body.textContent = `${path}: ${value}`;
      row.append(label, body);
      result.append(row);
    }

    function compare() {
      const left = parseJson(leftInput, leftStatus);
      const right = parseJson(rightInput, rightStatus);
      if (!left.ok || !right.ok) {
        result.textContent = "请先修正输入中的 JSON 错误。";
        return;
      }
      const a = flatten(left.value);
      const b = flatten(right.value);
      const keys = Array.from(new Set([...Object.keys(a), ...Object.keys(b)])).sort();
      result.textContent = "";
      let count = 0;
      keys.forEach(key => {
        if (!(key in a)) {
          addDiffLine("ADDED", key, b[key]);
          count += 1;
        } else if (!(key in b)) {
          addDiffLine("REMOVED", key, a[key]);
          count += 1;
        } else if (a[key] !== b[key]) {
          addDiffLine("CHANGED", key, `${a[key]} -> ${b[key]}`);
          count += 1;
        }
      });
      if (count === 0) {
        const empty = document.createElement("span");
        empty.className = "badge";
        empty.textContent = "两个 JSON 没有字段级差异。";
        result.append(empty);
      }
    }

    document.getElementById("compare").addEventListener("click", compare);
    document.getElementById("sample").addEventListener("click", () => {
      leftInput.value = JSON.stringify({ service: "api", version: 1, flags: { beta: false }, timeout: 1200 }, null, 2);
      rightInput.value = JSON.stringify({ service: "api", version: 2, flags: { beta: true }, retries: 3 }, null, 2);
      compare();
    });
    document.getElementById("copy").addEventListener("click", async () => {
      const text = result.textContent.trim();
      try { await navigator.clipboard.writeText(text); } catch (_) {}
    });
    [leftInput, rightInput].forEach(input => input.addEventListener("input", () => parseJson(input, input === leftInput ? leftStatus : rightStatus)));
  </script>
</body>
</html>
